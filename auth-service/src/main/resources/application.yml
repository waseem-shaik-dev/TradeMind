server:
  port: 8081

spring:
  application:
    name: auth-service


  profiles:
    active: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/auth_db
    username: postgres
    password: 1234
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer


jwt:
  secret: auth-secret-key
  expiration: 3600000
