server:
  port: 8093

spring:
  application:
    name: checkout-service


  profiles:
    active: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/checkout_db
    username: postgres
    password: 1234

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true




